<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #e8c97e;
      --accent2: #c9a84c;
      --text: #f0ece2;
      --muted: #888;
      --danger: #e07070;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    .cart-btn {
      position: relative;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50px;
      padding: 8px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .cart-btn:hover { background: var(--border); }
    .cart-badge {
      background: var(--accent);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }
    .cart-badge.show { display: flex; }

    /* CATEGORIES */
    .categories {
      display: flex;
      gap: 10px;
      padding: 16px 20px 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 50px;
      padding: 7px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* SECTION HEADER */
    .section-label {
      padding: 12px 20px 6px;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--accent);
    }

    /* PRODUCT GRID */
    .products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 8px 20px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
      animation: fadeUp 0.4s ease both;
    }
    .product-card:hover { transform: translateY(-2px); border-color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .product-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--surface2);
      font-size: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-info { padding: 12px; }
    .product-name {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 14px;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .product-desc {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .product-price {
      font-weight: 600;
      font-size: 15px;
      color: var(--accent);
    }
    .add-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
      line-height: 1;
    }
    .add-btn:hover { transform: scale(1.15); background: var(--accent2); }
    .add-btn.in-cart {
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    /* CART DRAWER */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      z-index: 201;
      padding: 20px 20px 40px;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .drawer-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item-emoji { font-size: 28px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 500; }
    .cart-item-price { font-size: 13px; color: var(--accent); }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .qty-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .qty-btn:hover { background: var(--border); }
    .qty-num { font-size: 14px; font-weight: 600; min-width: 16px; text-align: center; }

    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0 8px;
      font-size: 16px;
      font-weight: 600;
    }
    .total-amount { color: var(--accent); font-size: 20px; }

    /* NOTE INPUT */
    .note-section { margin: 10px 0 16px; }
    .note-section label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }
    .note-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    .note-input:focus { border-color: var(--accent); }
    .note-input::placeholder { color: var(--muted); }

    /* ORDER BUTTON */
    .order-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }
    .order-btn:hover { background: var(--accent2); transform: scale(1.01); }
    .order-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    /* EMPTY CART */
    .empty-cart {
      text-align: center;
      padding: 30px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .empty-cart-icon { font-size: 40px; margin-bottom: 10px; }

    /* SUCCESS SCREEN */
    .success-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 300;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      animation: fadeIn 0.4s ease;
    }
    .success-screen.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .success-icon { font-size: 72px; margin-bottom: 20px; animation: pop 0.5s ease 0.2s both; }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    .success-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .success-sub { color: var(--muted); font-size: 15px; line-height: 1.6; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">✦ My Shop</div>
    <button class="cart-btn" onclick="openCart()">
      🛒 Cart
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>

  <!-- CATEGORIES -->
  <div class="categories" id="categories"></div>

  <!-- PRODUCTS -->
  <div id="productSections"></div>

  <!-- CART DRAWER -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeCart()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Your Order</div>
    <div id="cartItems"></div>
    <div id="cartFooter" style="display:none">
      <div class="cart-total">
        <span>Total</span>
        <span class="total-amount" id="cartTotal"></span>
      </div>
      <div class="note-section">
        <label>Add a note (optional)</label>
        <textarea class="note-input" id="orderNote" rows="2" placeholder="e.g. No onions, deliver to gate 2..."></textarea>
      </div>
      <button class="order-btn" id="orderBtn" onclick="submitOrder()">Place Order</button>
    </div>
  </div>

  <!-- SUCCESS SCREEN -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">🎉</div>
    <div class="success-title">Order Sent!</div>
    <div class="success-sub">Your order has been received.<br>We'll get back to you shortly.</div>
  </div>

<script>
  // ─── EDIT YOUR PRODUCTS HERE ───────────────────────────────────────────────
  const PRODUCTS = [
    { id: 1, name: "Classic Burger", desc: "Beef patty, lettuce, tomato, cheese", price: 250, emoji: "🍔", category: "Food" },
    { id: 2, name: "Spicy Chicken", desc: "Crispy chicken with hot sauce", price: 220, emoji: "🌶️", category: "Food" },
    { id: 3, name: "Veggie Wrap", desc: "Fresh veggies in a warm tortilla", price: 180, emoji: "🌯", category: "Food" },
    { id: 4, name: "French Fries", desc: "Golden, crispy, salted", price: 80, emoji: "🍟", category: "Sides" },
    { id: 5, name: "Onion Rings", desc: "Crispy battered onion rings", price: 90, emoji: "🧅", category: "Sides" },
    { id: 6, name: "Coleslaw", desc: "Creamy homemade coleslaw", price: 60, emoji: "🥗", category: "Sides" },
    { id: 7, name: "Mango Juice", desc: "Fresh blended mango", price: 70, emoji: "🥭", category: "Drinks" },
    { id: 8, name: "Lemon Soda", desc: "Cold fizzy lemon drink", price: 50, emoji: "🍋", category: "Drinks" },
    { id: 9, name: "Iced Coffee", desc: "Cold brew with milk", price: 90, emoji: "☕", category: "Drinks" },
  ];

  // ─── CURRENCY SYMBOL ────────────────────────────────────────────────────────
  const CURRENCY = "ETB"; // Change to your currency

  // ─── YOUR BOT BACKEND URL ────────────────────────────────────────────────────
  // After setting up bot.js, replace this with your deployed URL:
  const BOT_BACKEND_URL = "https://stunning-mindfulness-production.up.railway.app/order";
  // ────────────────────────────────────────────────────────────────────────────

  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  let cart = {}; // { productId: quantity }

  // Build unique categories
  const categories = ["All", ...new Set(PRODUCTS.map(p => p.category))];

  // Render categories
  const catContainer = document.getElementById("categories");
  categories.forEach((cat, i) => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (i === 0 ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => filterCategory(cat, btn);
    catContainer.appendChild(btn);
  });

  function filterCategory(cat, btn) {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".product-section").forEach(section => {
      section.style.display = (cat === "All" || section.dataset.cat === cat) ? "block" : "none";
    });
  }

  // Render products grouped by category
  const sectionsEl = document.getElementById("productSections");
  const uniqueCats = [...new Set(PRODUCTS.map(p => p.category))];
  uniqueCats.forEach(cat => {
    const section = document.createElement("div");
    section.className = "product-section";
    section.dataset.cat = cat;
    section.innerHTML = `<div class="section-label">${cat}</div>`;
    const grid = document.createElement("div");
    grid.className = "products";
    PRODUCTS.filter(p => p.category === cat).forEach((p, i) => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.style.animationDelay = `${i * 0.07}s`;
      card.id = `card-${p.id}`;
      card.innerHTML = `
        <div class="product-img">${p.emoji}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>
          <div class="product-footer">
            <div class="product-price">${CURRENCY} ${p.price}</div>
            <button class="add-btn" id="addbtn-${p.id}" onclick="addToCart(${p.id})">+</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
    section.appendChild(grid);
    sectionsEl.appendChild(section);
  });

  function addToCart(id) {
    cart[id] = (cart[id] || 0) + 1;
    updateCartUI();
    const btn = document.getElementById(`addbtn-${id}`);
    btn.classList.add("in-cart");
    btn.textContent = cart[id];
    setTimeout(() => { btn.textContent = cart[id] > 0 ? cart[id] : "+"; }, 0);
  }

  function updateCartUI() {
    const total = Object.values(cart).reduce((a, b) => a + b, 0);
    const badge = document.getElementById("cartBadge");
    badge.textContent = total;
    badge.classList.toggle("show", total > 0);
  }

  function openCart() {
    renderCartItems();
    document.getElementById("drawer").classList.add("open");
    document.getElementById("drawerOverlay").classList.add("open");
  }

  function closeCart() {
    document.getElementById("drawer").classList.remove("open");
    document.getElementById("drawerOverlay").classList.remove("open");
  }

  function renderCartItems() {
    const container = document.getElementById("cartItems");
    const footer = document.getElementById("cartFooter");
    const cartKeys = Object.keys(cart).filter(id => cart[id] > 0);

    if (cartKeys.length === 0) {
      container.innerHTML = `<div class="empty-cart"><div class="empty-cart-icon">🛒</div>Your cart is empty</div>`;
      footer.style.display = "none";
      return;
    }

    let total = 0;
    container.innerHTML = cartKeys.map(id => {
      const p = PRODUCTS.find(p => p.id == id);
      const subtotal = p.price * cart[id];
      total += subtotal;
      return `<div class="cart-item">
        <div class="cart-item-emoji">${p.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-price">${CURRENCY} ${subtotal}</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
          <div class="qty-num">${cart[id]}</div>
          <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
        </div>
      </div>`;
    }).join("");

    document.getElementById("cartTotal").textContent = `${CURRENCY} ${total}`;
    footer.style.display = "block";
  }

  function changeQty(id, delta) {
    cart[id] = Math.max(0, (cart[id] || 0) + delta);
    if (cart[id] === 0) delete cart[id];

    // Update add button on product card
    const btn = document.getElementById(`addbtn-${id}`);
    if (btn) {
      if (cart[id] > 0) { btn.classList.add("in-cart"); btn.textContent = cart[id]; }
      else { btn.classList.remove("in-cart"); btn.textContent = "+"; }
    }
    updateCartUI();
    renderCartItems();
  }

  async function submitOrder() {
    const cartKeys = Object.keys(cart).filter(id => cart[id] > 0);
    if (cartKeys.length === 0) return;

    const btn = document.getElementById("orderBtn");
    btn.disabled = true;
    btn.textContent = "Sending...";

    const items = cartKeys.map(id => {
      const p = PRODUCTS.find(p => p.id == id);
      return { name: p.name, qty: cart[id], price: p.price };
    });

    const total = items.reduce((sum, i) => sum + i.qty * i.price, 0);
    const note = document.getElementById("orderNote").value.trim();

    // Build the order message text
    const itemLines = items.map(i => `• ${i.qty}x ${i.name} — ${CURRENCY} ${i.qty * i.price}`).join("%0A");
    const noteSection = note ? `%0A📝 Note: ${note}` : "";
    const orderText = `🛍️ New Order!%0A%0AItems:%0A${itemLines}%0A%0A💰 Total: ${CURRENCY} ${total}${noteSection}`;

    // Get Telegram user info
    const user = tg?.initDataUnsafe?.user;
    const userName = user ? `${user.first_name || ""} ${user.last_name || ""}`.trim() : "Unknown";
    const userHandle = user?.username ? `@${user.username}` : "No username";
    const userId = user?.id || "N/A";

    const payload = {
      user: { name: userName, handle: userHandle, id: userId },
      items,
      total,
      currency: CURRENCY,
      note,
      initData: tg?.initData || ""
    };

    try {
      await fetch(BOT_BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    } catch (e) {
      console.error("Order send failed:", e);
    }

    closeCart();

    // Open a chat with the bot with the order pre-filled — customer just taps Send!
    const botUsername = "arbeiter1bot";
    const deepLink = `https://t.me/${botUsername}?text=${orderText}`;
    window.open(deepLink, "_blank");

    document.getElementById("successScreen").classList.add("show");
    setTimeout(() => { if (tg) tg.close(); }, 3000);
  }
</script>
</body>
</html>
